<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wyrdcraft SMP</title>
  <link rel="icon" type="image/png" href="images/wyrdcraft_icon_round.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0c0d0f;
      --surface:     #13151a;
      --surface-back:#181b23;
      --surface-pill:#16181f;
      --border:      rgba(255,255,255,0.07);
      --border-glow: rgba(184,154,106,0.35);
      --border-hover:rgba(184,154,106,0.28);
      --text:        #e8e4dc;
      --muted:       #7a7670;
      --accent:      #b89a6a;
      --accent-dim:  #6e5b3a;
      --purple:      rgba(120,80,180,0.18);
      --card-h:      210px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Crimson Pro', Georgia, serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    #rune-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    #trail-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9999;
    }

    @media (hover: none) { #trail-canvas { display: none; } }

    .bottom-glow {
      position: fixed;
      bottom: 0; left: 0; right: 0; height: 280px;
      background: radial-gradient(ellipse 90% 100% at 50% 100%,
        rgba(120,80,180,0.18) 0%, rgba(184,154,106,0.07) 45%, transparent 75%);
      pointer-events: none;
      z-index: 0;
      animation: glow-breathe 6s ease-in-out infinite;
    }

    @keyframes glow-breathe { 0%,100%{opacity:.7} 50%{opacity:1} }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(184,154,106,0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── header ── */
    header {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem 1rem 1rem;
    }

    .eyebrow {
      font-family: 'Cinzel', serif;
      font-size: 10px; font-weight: 400;
      letter-spacing: 0.35em; color: var(--accent);
      text-transform: uppercase; margin-bottom: 1rem;
      opacity: 0; animation: fade-up 0.8s 0.1s ease forwards;
    }

    h1 {
      font-family: 'Cinzel', serif;
      font-size: clamp(2.8rem, 8vw, 5.5rem);
      font-weight: 600; letter-spacing: 0.12em;
      color: var(--text); line-height: 1;
      opacity: 0; animation: fade-up 0.8s 0.25s ease forwards;
    }

    .header-logo {
      max-width: min(680px, 90vw);
      height: auto;
      display: block;
      margin: 0 auto;
    }

    .tagline {
      font-family: 'Crimson Pro', serif;
      font-style: italic; font-size: 1.15rem; font-weight: 300;
      color: var(--muted); margin-top: 1rem;
      opacity: 0; animation: fade-up 0.8s 0.4s ease forwards;
    }

    .description {
      font-family: 'Crimson Pro', serif;
      font-style: italic; font-size: 1rem; font-weight: 300;
      color: var(--accent-dim); margin-top: 0.6rem; letter-spacing: 0.03em;
      opacity: 0; animation: fade-up 0.8s 0.52s ease forwards;
    }

    .divider {
      width: 60px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent-dim), transparent);
      margin: 2rem auto 0;
      opacity: 0; animation: fade-up 0.8s 0.65s ease forwards;
    }

    /* ── tabs ── */
    .tabs-wrap {
      position: relative; z-index: 1;
      display: flex; justify-content: center; gap: 0;
      padding: 2.5rem 1rem 0;
    }

    .tab-btn {
      font-family: 'Cinzel', serif; font-size: 10px; font-weight: 400;
      letter-spacing: 0.3em; text-transform: uppercase;
      color: var(--muted); background: none; border: none;
      border-bottom: 1px solid var(--border);
      padding: 0.6rem 2rem 0.7rem; cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }

    .tab-btn:hover { color: var(--text); }

    .tab-btn.active {
      color: var(--accent);
      border-bottom: 1px solid var(--accent);
    }

    /* ── main ── */
    main {
      position: relative; z-index: 1;
      max-width: 1100px; margin: 0 auto;
      padding: 2.5rem 1.5rem 2.5rem;
    }

    /* ── tab panels ── */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── member cards grid ── */
    .grid {
      display: grid;
      gap: 1.5rem;
      justify-content: center;
      grid-template-columns: repeat(3, minmax(0, 200px));
    }
    @media (max-width: 680px)  { .grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 440px)  { .grid { grid-template-columns: 1fr; max-width: 320px; margin: 0 auto; } }

    /* ── flip card ── */
    .flip-wrap {
      perspective: 900px;
      width: 100%;
      height: var(--card-h);
      opacity: 0;
      animation: fade-up 0.55s ease forwards;
    }

    .flip-inner {
      position: relative; width: 100%; height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.58s cubic-bezier(0.4, 0.2, 0.2, 1);
    }

    .flip-wrap:hover .flip-inner { transform: rotateY(180deg); }

    .face {
      position: absolute; inset: 0;
      border-radius: 10px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border: 1px solid var(--border);
      transition: box-shadow 0.4s ease;
    }

    .front {
      background: var(--surface);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 1.25rem 0.75rem 1.5rem;
    }

    .flip-wrap:hover .front { box-shadow: 0 0 18px 2px rgba(120,80,180,0.15); }

    .skin {
      width: 76px; height: 114px;
      image-rendering: pixelated;
      display: block;
    }

    .card-name {
      font-family: 'Cinzel', serif; font-size: 9.5px; font-weight: 400;
      letter-spacing: 0.06em; color: var(--text);
      margin-top: 0.9rem; text-align: center;
      line-height: 1.4; word-break: break-word;
    }

    .flip-hint {
      position: absolute; bottom: 8px;
      font-family: 'Crimson Pro', serif; font-style: italic;
      font-size: 9px; color: var(--accent-dim);
      letter-spacing: 0.04em; opacity: 0.7;
    }

    .back {
      background: var(--surface-back);
      border-color: var(--border-glow);
      transform: rotateY(180deg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 1.25rem 1rem;
      box-shadow: inset 0 0 30px rgba(184,154,106,0.06);
    }

    .flip-wrap:hover .back {
      box-shadow: inset 0 0 30px rgba(184,154,106,0.10), 0 0 22px 3px rgba(184,154,106,0.12);
    }

    .back-name {
      font-family: 'Cinzel', serif; font-size: 10px; font-weight: 400;
      letter-spacing: 0.1em; color: var(--accent);
      text-align: center; margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(184,154,106,0.2);
      width: 100%; word-break: break-word;
    }

    .social-links { display: flex; flex-direction: column; gap: 6px; width: 100%; }

    .social-link {
      display: flex; align-items: center; gap: 9px;
      font-family: 'Crimson Pro', serif; font-size: 14px; font-weight: 300;
      color: #9a9590; text-decoration: none;
      padding: 4px 8px; border-radius: 5px;
      border: 1px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }

    .social-link:hover { color: var(--text); border-color: rgba(184,154,106,0.25); }
    .social-link svg { flex-shrink: 0; opacity: 0.7; }

    .no-socials {
      font-family: 'Crimson Pro', serif; font-style: italic;
      font-size: 12px; color: var(--muted); text-align: center;
    }

    /* ── video grid ── */
    .video-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1.1rem;
    }
    @media (max-width: 1100px) { .video-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 780px)  { .video-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 480px)  { .video-grid { grid-template-columns: 1fr; } }

    /* ── video card ── */
    .video-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px; overflow: hidden;
      display: flex; flex-direction: column;
      opacity: 0; animation: fade-up 0.5s ease forwards;
      transition: border-color 0.25s, transform 0.25s, box-shadow 0.25s;
      text-decoration: none; color: inherit;
    }

    .video-card:hover {
      border-color: var(--border-hover);
      transform: translateY(-3px);
      box-shadow: 0 8px 28px rgba(0,0,0,0.35);
    }

    .thumb {
      position: relative; width: 100%; aspect-ratio: 16/9;
      background: var(--surface-back); overflow: hidden; flex-shrink: 0;
    }

    .thumb img {
      width: 100%; height: 100%; object-fit: cover;
      display: block; opacity: 0.85;
      transition: opacity 0.3s, transform 0.4s;
    }

    .video-card:hover .thumb img { opacity: 1; transform: scale(1.04); }

    .play-btn {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0); transition: background 0.25s;
    }

    .video-card:hover .play-btn { background: rgba(0,0,0,0.22); }

    .play-circle {
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(184,154,106,0.9);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transform: scale(0.8);
      transition: opacity 0.22s, transform 0.22s;
    }

    .video-card:hover .play-circle { opacity: 1; transform: scale(1); }
    .play-circle svg { width: 14px; height: 14px; fill: #0c0d0f; margin-left: 2px; }

    .duration {
      position: absolute; bottom: 6px; right: 7px;
      font-family: 'Cinzel', serif; font-size: 9px;
      letter-spacing: 0.06em; color: #e8e4dc;
      background: rgba(12,13,15,0.82);
      padding: 2px 6px; border-radius: 3px;
    }

    .thumb-skeleton {
      width: 100%; height: 100%;
      background: linear-gradient(90deg, #13151a 25%, #1d2029 50%, #13151a 75%);
      background-size: 200% 100%;
      animation: shimmer 1.6s infinite;
    }

    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    .card-meta {
      padding: 0.75rem 0.9rem 0.85rem;
      display: flex; flex-direction: column; gap: 0.4rem; flex: 1;
    }

    .video-title-text {
      font-family: 'Crimson Pro', serif; font-size: 14px; font-weight: 400;
      color: var(--text); line-height: 1.45;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }

    .video-card:hover .video-title-text { color: var(--accent); }

    .creator-row {
      display: flex; align-items: center; gap: 7px;
      margin-top: auto; padding-top: 0.5rem;
      border-top: 1px solid var(--border);
    }

    .creator-avatar {
      width: 22px; height: 22px; border-radius: 3px;
      image-rendering: pixelated; background: var(--surface-back); flex-shrink: 0;
    }

    .creator-name-text {
      font-family: 'Cinzel', serif; font-size: 8.5px; font-weight: 400;
      letter-spacing: 0.1em; color: var(--accent); text-transform: uppercase;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
    }

    .time-ago {
      font-family: 'Crimson Pro', serif; font-style: italic;
      font-size: 11px; color: var(--muted); white-space: nowrap; flex-shrink: 0;
    }

    .status-msg {
      grid-column: 1 / -1; text-align: center;
      font-family: 'Crimson Pro', serif; font-style: italic;
      font-size: 14px; color: var(--muted); padding: 3rem 0;
    }

    footer {
      position: relative; z-index: 1; text-align: center;
      padding-bottom: 3rem; font-family: 'Crimson Pro', serif;
      font-style: italic; font-size: 13px; color: var(--muted);
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<canvas id="rune-canvas" aria-hidden="true"></canvas>
<canvas id="trail-canvas" aria-hidden="true"></canvas>
<div class="bottom-glow" aria-hidden="true"></div>

<header>
  <p class="eyebrow">Survival Multiplayer</p>
  <h1><img src="images/wyrdcraft_text_logo.png" alt="Wyrdcraft" class="header-logo" /></h1>
  <p class="description">"Your fate is drawn. What you do with it is up to you."</p>
  <div class="divider"></div>
</header>

<!-- tabs -->
<div class="tabs-wrap">
  <button class="tab-btn active" data-tab="members">The Members</button>
  <button class="tab-btn" data-tab="latest">Latest Videos</button>
  <button class="tab-btn" data-tab="creators">Members Videos</button>
</div>

<main>
  <!-- Members tab -->
  <div class="tab-panel active" id="panel-members">
    <div class="grid" id="grid"></div>
  </div>

  <!-- Latest Videos tab -->
  <div class="tab-panel" id="panel-latest">
    <div class="video-grid" id="grid-latest"></div>
  </div>

  <!-- Members Videos tab -->
  <div class="tab-panel" id="panel-creators">
    <div class="video-grid" id="grid-creators"></div>
  </div>
</main>

<footer></footer>

<script>
/* ── RUNE ANIMATION ── */
(function () {
  const canvas = document.getElementById('rune-canvas');
  const ctx    = canvas.getContext('2d');

  const RUNES = ['ᚠ','ᚢ','ᚦ','ᚨ','ᚱ','ᚲ','ᚷ','ᚹ','ᚺ','ᚾ',
                 'ᛁ','ᛃ','ᛇ','ᛈ','ᛉ','ᛊ','ᛏ','ᛒ','ᛖ','ᛗ',
                 'ᛚ','ᛜ','ᛞ','ᛟ','ᚻ','ᚼ','ᛦ','ᛥ','ᛣ','ᛤ'];

  const GOLD   = [184, 154, 106];
  const PURPLE = [120,  80, 180];

  let W, H, particles;

  function rand(a, b) { return Math.random() * (b - a) + a; }

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function makeParticle(staggerY) {
    const cursed  = Math.random() < 0.42;
    const col     = cursed ? PURPLE : GOLD;
    const size    = rand(12, 26);
    const dur     = rand(12000, 28000);
    const startMs = staggerY ? -(Math.random() * dur) : 0;
    return {
      x0: rand(0, W), drift: rand(-40, 40), size,
      rune: RUNES[Math.floor(Math.random() * RUNES.length)],
      r: col[0], g: col[1], b: col[2],
      peakA: rand(0.05, cursed ? 0.16 : 0.21),
      dur, startMs,
      rot0: rand(-0.5, 0.5), rotSpd: rand(-0.0008, 0.0008),
      flicker: cursed, ft: rand(0, Math.PI * 2),
    };
  }

  function initParticles() {
    const count = Math.max(20, Math.floor(W * H / 20000));
    particles = Array.from({ length: count }, () => makeParticle(true));
  }

  let lastTs = null;

  function tick(ts) {
    if (!lastTs) lastTs = ts;
    const dt = ts - lastTs;
    lastTs = ts;
    ctx.clearRect(0, 0, W, H);

    for (let i = 0; i < particles.length; i++) {
      const p = particles[i];
      p.startMs += dt;
      p.ft      += dt * 0.0018;

      let prog = p.startMs / p.dur;
      if (prog >= 1) { particles[i] = makeParticle(false); continue; }

      const y   = H + p.size - (H + p.size * 3) * prog;
      const x   = p.x0 + p.drift * prog;
      const rot = p.rot0 + p.rotSpd * p.startMs;

      let alpha;
      if (p.flicker) {
        alpha = p.peakA * (1 - prog) * (0.5 + 0.5 * Math.sin(p.ft * 2.2 + Math.sin(p.ft * 3.5)));
      } else {
        const fi = Math.min(1, prog / 0.15);
        const fo = prog > 0.75 ? Math.max(0, 1 - (prog - 0.75) / 0.25) : 1;
        alpha = p.peakA * fi * fo;
      }

      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(rot);
      ctx.globalAlpha = Math.min(1, Math.max(0, alpha));
      ctx.fillStyle   = `rgb(${p.r},${p.g},${p.b})`;
      ctx.font        = `${p.size}px serif`;
      ctx.textAlign   = 'center';
      ctx.textBaseline= 'middle';
      ctx.fillText(p.rune, 0, 0);
      ctx.restore();
    }
    requestAnimationFrame(tick);
  }

  resize();
  initParticles();
  requestAnimationFrame(tick);
  window.addEventListener('resize', () => { resize(); initParticles(); });
})();

/* ── TABS ── */
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
  });
});

/* ── MEMBER CARDS ── */
const YT = url => ({ icon: 'yt', label: 'YouTube', url });
const TW = url => ({ icon: 'tw', label: 'Twitch',  url });

const svgYT = `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M23 7s-.3-2-1.2-2.8c-1.1-1.2-2.4-1.2-3-1.3C16.2 2.8 12 2.8 12 2.8s-4.2 0-6.8.1c-.6.1-1.9.1-3 1.3C1.3 5 1 7 1 7S.7 9.1.7 11.3v2c0 2.1.3 4.3.3 4.3s.3 2 1.2 2.8c1.1 1.2 2.6 1.1 3.3 1.2C7.3 21.8 12 21.8 12 21.8s4.2 0 6.8-.2c.6-.1 1.9-.1 3-1.3.9-.8 1.2-2.8 1.2-2.8s.3-2.1.3-4.3v-2C23.3 9.1 23 7 23 7zm-13.5 8.7V8.3l8.1 3.7-8.1 3.7z"/></svg>`;
const svgTW = `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714z"/></svg>`;
const iconMap = { yt: svgYT, tw: svgTW };

const members = [
  { uuid: 'b94fbcc5862d4cf4a9fbf29cab6d2b4b', name: 'dadmannwalking', socials: [ YT('https://www.youtube.com/@dadmannwalking'), TW('https://www.twitch.tv/dadmannwalking') ] },
  { uuid: '8f43758dd3604939894ca5de999f738d', name: 'SHO310',           socials: [ YT('https://www.youtube.com/@sho310yt'), TW('https://www.twitch.tv/sho310tv') ] },
  { uuid: 'e5daed5e36184f0fb1c40a31a2fa22ae', name: 'REDPalette12',     socials: [ YT('https://www.youtube.com/@REDPalette12'), TW('https://www.twitch.tv/redpalette12') ] },
  { uuid: '9c40344415e842fe9d1e76cb7dbebab2', name: 'HeroicPixels',     socials: [ YT('https://www.youtube.com/@heroicpixels'), TW('https://www.twitch.tv/heroicpixels') ] },
  { uuid: 'd938bf55d86e47eb941ff6fcd75ded6a', name: '__haunted__',      socials: [ YT('https://www.youtube.com/@haunted_minecrafting') ] },
  { uuid: '60961e686275479c82240990fc9e9f35', name: 'ThatOneGuyJames',  socials: [ YT('https://www.youtube.com/@thatoneguyjames1') ] },
];

const grid = document.getElementById('grid');

members.forEach((m, i) => {
  const skinUrl = `https://visage.surgeplay.com/full/128/${m.uuid}`;
  const fallback = `https://visage.surgeplay.com/full/128/8667ba71b85a4004af54457a9734eed7`;

  const linksHtml = m.socials.length
    ? m.socials.map(s => `<a class="social-link" href="${s.url}" target="_blank" rel="noopener noreferrer">${iconMap[s.icon]} ${s.label}</a>`).join('')
    : `<span class="no-socials">no links yet</span>`;

  const wrap = document.createElement('div');
  wrap.className = 'flip-wrap';
  wrap.style.animationDelay = `${0.05 * i + 0.6}s`;
  wrap.innerHTML = `
    <div class="flip-inner">
      <div class="face front">
        <img class="skin" src="${skinUrl}" alt="${m.name}'s Minecraft skin" onerror="this.src='${fallback}'" loading="lazy" />
        <div class="card-name">${m.name}</div>
        <span class="flip-hint">hover to reveal</span>
      </div>
      <div class="face back">
        <div class="back-name">${m.name}</div>
        <div class="social-links">${linksHtml}</div>
      </div>
    </div>
  `;
  grid.appendChild(wrap);
});

/* ── VIDEO HELPERS ── */
function timeAgo(dateStr) {
  const diff = (Date.now() - new Date(dateStr)) / 1000;
  if (diff < 3600)    return Math.round(diff / 60) + 'm ago';
  if (diff < 86400)   return Math.round(diff / 3600) + 'h ago';
  if (diff < 604800)  return Math.round(diff / 86400) + 'd ago';
  if (diff < 2592000) return Math.round(diff / 604800) + 'w ago';
  return new Date(dateStr).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
}

function isShort(title, seconds) {
  if (seconds && seconds <= 180) return true;
  if (title && /#shorts/i.test(title)) return true;
  return false;
}

function parseDuration(iso) {
  if (!iso) return null;
  const m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if (!m) return null;
  return (parseInt(m[1]||0)*3600) + (parseInt(m[2]||0)*60) + parseInt(m[3]||0);
}

function formatDuration(seconds) {
  if (!seconds) return '';
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = seconds % 60;
  if (h > 0) return h + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  return m + ':' + String(s).padStart(2,'0');
}

/* ── FETCH via YouTube Data API ── */
const PROXY       = 'https://corsproxy.io/?';
const API_KEY     = 'AIzaSyDxRU7kur0YcnipiY9hC6zM9L9_ufk8_9A';
const USE_API_KEY = false;

async function fetchVideos(member) {
  const feedUrl = 'https://www.youtube.com/feeds/videos.xml?channel_id=' + member.channelId;
  const proxied = PROXY + encodeURIComponent(feedUrl);
  const res  = await fetch(proxied, { signal: AbortSignal.timeout(14000) });
  const data = await res.json();
  const xml  = new DOMParser().parseFromString(data.contents, 'text/xml');
  const entries = Array.from(xml.querySelectorAll('entry'));

  const videos = [];
  for (const entry of entries) {
    const videoId   = entry.querySelector('videoId')?.textContent?.trim();
    const title     = entry.querySelector('title')?.textContent?.trim();
    const published = entry.querySelector('published')?.textContent?.trim();
    const thumbUrl  = entry.querySelector('thumbnail')?.getAttribute('url')
                   || (videoId ? 'https://i.ytimg.com/vi/' + videoId + '/mqdefault.jpg' : null);
    if (!videoId || !title) continue;
    if (isShort(title, null)) continue;
    videos.push({ videoId, title, published, thumbUrl, member, durationSec: null });
  }
  return videos;
}

async function fetchVideosWithAPI(member) {
  const searchUrl = 'https://www.googleapis.com/youtube/v3/search?key=' + API_KEY
    + '&channelId=' + member.channelId
    + '&part=snippet&order=date&maxResults=30&type=video';
  const searchRes  = await fetch(searchUrl);
  const searchData = await searchRes.json();
  if (!searchData.items?.length) return [];

  const ids = searchData.items.map(i => i.id.videoId).join(',');
  const detailUrl  = 'https://www.googleapis.com/youtube/v3/videos?key=' + API_KEY
    + '&id=' + ids + '&part=contentDetails';
  const detailRes  = await fetch(detailUrl);
  const detailData = await detailRes.json();
  const durMap = {};
  (detailData.items || []).forEach(v => { durMap[v.id] = parseDuration(v.contentDetails.duration); });

  const videos = [];
  for (const item of searchData.items) {
    const videoId   = item.id.videoId;
    const title     = item.snippet.title;
    const published = item.snippet.publishedAt;
    const thumbUrl  = item.snippet.thumbnails.medium?.url || item.snippet.thumbnails.default?.url;
    const durationSec = durMap[videoId] || null;
    if (isShort(title, durationSec)) continue;
    videos.push({ videoId, title, published, thumbUrl, member, durationSec });
  }
  return videos;
}

/* ── BUILD VIDEO CARD ── */
function buildCard(video, index) {
  const { videoId, title, published, thumbUrl, member, durationSec } = video;
  const ytUrl    = 'https://www.youtube.com/watch?v=' + videoId;
  const skinUrl  = 'https://visage.surgeplay.com/face/32/' + member.uuid;
  const fallback = 'https://visage.surgeplay.com/face/32/8667ba71b85a4004af54457a9734eed7';
  const durLabel = durationSec ? formatDuration(durationSec) : '';

  const card = document.createElement('a');
  card.className = 'video-card';
  card.href = ytUrl;
  card.target = '_blank';
  card.rel = 'noopener noreferrer';
  card.style.animationDelay = (0.04 * index + 0.1) + 's';
  card.innerHTML =
    '<div class="thumb">' +
      '<img src="' + thumbUrl + '" alt="' + title.replace(/"/g,'&quot;') + '" loading="lazy" />' +
      '<div class="play-btn"><div class="play-circle"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div></div>' +
      (durLabel ? '<span class="duration">' + durLabel + '</span>' : '') +
    '</div>' +
    '<div class="card-meta">' +
      '<div class="video-title-text">' + title + '</div>' +
      '<div class="creator-row">' +
        '<img class="creator-avatar" src="' + skinUrl + '" alt="' + member.name + '" onerror="this.src=\'' + fallback + '\'" loading="lazy" />' +
        '<span class="creator-name-text">' + member.name + '</span>' +
        '<span class="time-ago">' + timeAgo(published) + '</span>' +
      '</div>' +
    '</div>';
  return card;
}

/* ── MAIN INIT ── */
async function init() {
  const gridLatest   = document.getElementById('grid-latest');
  const gridCreators = document.getElementById('grid-creators');

  gridLatest.innerHTML   = '<p class="status-msg">Fetching the latest videos…</p>';
  gridCreators.innerHTML = '<p class="status-msg">Fetching the latest videos…</p>';

  const fetchFn = USE_API_KEY && API_KEY ? fetchVideosWithAPI : fetchVideos;
  const results = await Promise.allSettled(MEMBERS.map(m => fetchFn(m)));

  const allVideos = [];
  results.forEach(r => {
    if (r.status === 'fulfilled') allVideos.push(...r.value);
    else console.warn('Fetch failed:', r.reason?.message);
  });

  if (!allVideos.length) {
    gridLatest.innerHTML   = '<p class="status-msg">Could not load videos — try refreshing.</p>';
    gridCreators.innerHTML = '<p class="status-msg">Could not load videos — try refreshing.</p>';
    return;
  }

  // Sort all by publish date descending (latest first)
  allVideos.sort((a, b) => new Date(b.published) - new Date(a.published));

  // Latest Videos tab: top 15 most recent across all members
  gridLatest.innerHTML = '';
  allVideos.slice(0, 15).forEach((v, i) => gridLatest.appendChild(buildCard(v, i)));

  // Members Videos tab: most recent 1 video per member
  gridCreators.innerHTML = '';
  const seen = new Set();
  const creatorVideos = [];
  for (const v of allVideos) {
    if (!seen.has(v.member.name)) {
      seen.add(v.member.name);
      creatorVideos.push(v);
    }
  }
  creatorVideos.forEach((v, i) => gridCreators.appendChild(buildCard(v, i)));
}

/* ── SPARKLE TRAIL ── */
(function () {
  // Disable entirely on touch/mobile devices
  if (window.matchMedia('(hover: none)').matches) return;

  const canvas = document.getElementById('trail-canvas');
  const ctx    = canvas.getContext('2d');

  const RUNES  = ['ᚠ','ᚢ','ᚦ','ᚨ','ᚱ','ᚲ','ᚷ','ᚹ','ᚾ','ᛁ','ᛇ','ᛈ','ᛊ','ᛏ','ᛒ','ᛖ','ᛗ','ᛚ','ᛞ','ᛟ'];
  const STARS  = ['✦','✧','⋆','·','✵','✴'];
  const GOLD   = [[184,154,106],[210,180,130],[230,200,155]];
  const PURPLE = [[140,90,200],[160,110,220],[120,70,180]];

  let W, H;
  const sparks = [];
  let mx = -999, my = -999;
  let lastSpawn = 0;
  let mouseOnPage = false;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  resize();
  window.addEventListener('resize', resize);

  window.addEventListener('mousemove', e => {
    mx = e.clientX;
    my = e.clientY;
    mouseOnPage = true;
  });

  // Stop spawning when mouse leaves the browser window
  document.addEventListener('mouseleave', () => {
    mouseOnPage = false;
    mx = -999;
    my = -999;
  });

  document.addEventListener('mouseenter', () => {
    mouseOnPage = true;
  });

  function spawnSpark(x, y) {
    const useRune  = Math.random() < 0.35;
    const usePurp  = Math.random() < 0.3;
    const colSet   = usePurp ? PURPLE : GOLD;
    const col      = colSet[Math.floor(Math.random() * colSet.length)];
    const glyph    = useRune
      ? RUNES[Math.floor(Math.random() * RUNES.length)]
      : STARS[Math.floor(Math.random() * STARS.length)];
    const size     = useRune ? (Math.random() * 9 + 7) : (Math.random() * 7 + 4);
    const angle    = Math.random() * Math.PI * 2;
    const speed    = Math.random() * 1.4 + 0.3;
    const life     = Math.random() * 480 + 280;

    sparks.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 0.5,
      glyph, size,
      r: col[0], g: col[1], b: col[2],
      alpha: 0.9,
      life, age: 0,
      rot: Math.random() * Math.PI * 2,
      rotSpd: (Math.random() - 0.5) * 0.04,
    });
  }

  let last = null;

  function tick(ts) {
    if (!last) last = ts;
    const dt = ts - last;
    last = ts;

    // Only spawn when mouse is inside the window
    if (mouseOnPage && ts - lastSpawn > 25) {
      const count = Math.floor(Math.random() * 2) + 1;
      for (let i = 0; i < count; i++) {
        const jx = mx + (Math.random() - 0.5) * 10;
        const jy = my + (Math.random() - 0.5) * 10;
        spawnSpark(jx, jy);
      }
      lastSpawn = ts;
    }

    ctx.clearRect(0, 0, W, H);

    for (let i = sparks.length - 1; i >= 0; i--) {
      const s = sparks[i];
      s.age  += dt;
      s.x    += s.vx * (dt / 16);
      s.y    += s.vy * (dt / 16);
      s.vy   += 0.018 * (dt / 16); // gentle gravity
      s.rot  += s.rotSpd * (dt / 16);

      const prog  = s.age / s.life;
      s.alpha = prog < 0.15
        ? prog / 0.15
        : Math.max(0, 1 - (prog - 0.15) / 0.85);

      if (s.age >= s.life) { sparks.splice(i, 1); continue; }

      ctx.save();
      ctx.globalAlpha = s.alpha * 0.88;
      ctx.translate(s.x, s.y);
      ctx.rotate(s.rot);
      ctx.fillStyle = `rgb(${s.r},${s.g},${s.b})`;
      ctx.font = `${s.size}px serif`;
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';

      // soft glow
      ctx.shadowColor  = `rgba(${s.r},${s.g},${s.b},0.6)`;
      ctx.shadowBlur   = 6;

      ctx.fillText(s.glyph, 0, 0);
      ctx.restore();
    }

    requestAnimationFrame(tick);
  }

  requestAnimationFrame(tick);
})();
