<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wyrdcraft — The Crew</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0c0d0f;
      --surface:     #13151a;
      --surface-back:#181b23;
      --border:      rgba(255,255,255,0.07);
      --border-glow: rgba(184,154,106,0.35);
      --text:        #e8e4dc;
      --muted:       #7a7670;
      --accent:      #b89a6a;
      --accent-dim:  #6e5b3a;
      --card-h:      210px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Crimson Pro', Georgia, serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* rune canvas */
    #rune-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    /* bottom fog glow */
    .bottom-glow {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 280px;
      background: radial-gradient(ellipse 90% 100% at 50% 100%,
        rgba(120, 80, 180, 0.18) 0%,
        rgba(184, 154, 106, 0.07) 45%,
        transparent 75%);
      pointer-events: none;
      z-index: 0;
      animation: glow-breathe 6s ease-in-out infinite;
    }

    @keyframes glow-breathe {
      0%,100% { opacity: 0.7; }
      50%      { opacity: 1;   }
    }

    /* top vignette */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(184,154,106,0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── header ── */
    header {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 5rem 1rem 3.5rem;
    }

    .eyebrow {
      font-family: 'Cinzel', serif;
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.35em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 1rem;
      opacity: 0;
      animation: fade-up 0.8s 0.1s ease forwards;
    }

    h1 {
      font-family: 'Cinzel', serif;
      font-size: clamp(2.8rem, 8vw, 5.5rem);
      font-weight: 600;
      letter-spacing: 0.12em;
      color: var(--text);
      line-height: 1;
      opacity: 0;
      animation: fade-up 0.8s 0.25s ease forwards;
    }

    .tagline {
      font-family: 'Crimson Pro', serif;
      font-style: italic;
      font-size: 1.15rem;
      font-weight: 300;
      color: var(--muted);
      margin-top: 1rem;
      opacity: 0;
      animation: fade-up 0.8s 0.4s ease forwards;
    }

    .description {
      font-family: 'Crimson Pro', serif;
      font-style: italic;
      font-size: 1rem;
      font-weight: 300;
      color: var(--accent-dim);
      margin-top: 0.6rem;
      letter-spacing: 0.03em;
      opacity: 0;
      animation: fade-up 0.8s 0.52s ease forwards;
    }

    .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent-dim), transparent);
      margin: 2rem auto 0;
      opacity: 0;
      animation: fade-up 0.8s 0.65s ease forwards;
    }

    /* ── grid ── */
    main {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 1.5rem 8rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 1.5rem;
    }

    /* ── flip card ── */
    .flip-wrap {
      perspective: 900px;
      width: 100%;
      height: var(--card-h);
      opacity: 0;
      animation: fade-up 0.55s ease forwards;
    }

    .flip-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.58s cubic-bezier(0.4, 0.2, 0.2, 1);
    }

    .flip-wrap:hover .flip-inner {
      transform: rotateY(180deg);
    }

    .face {
      position: absolute;
      inset: 0;
      border-radius: 10px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border: 1px solid var(--border);
      transition: box-shadow 0.4s ease;
    }

    /* front */
    .front {
      background: var(--surface);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.25rem 0.75rem 1.5rem;
    }

    .flip-wrap:hover .front {
      box-shadow: 0 0 18px 2px rgba(120, 80, 180, 0.15);
    }

    .skin {
      width: 76px;
      height: 114px;
      image-rendering: pixelated;
      display: block;
    }

    .card-name {
      font-family: 'Cinzel', serif;
      font-size: 9.5px;
      font-weight: 400;
      letter-spacing: 0.06em;
      color: var(--text);
      margin-top: 0.9rem;
      text-align: center;
      line-height: 1.4;
      word-break: break-word;
    }

    .flip-hint {
      position: absolute;
      bottom: 8px;
      font-family: 'Crimson Pro', serif;
      font-style: italic;
      font-size: 9px;
      color: var(--accent-dim);
      letter-spacing: 0.04em;
      opacity: 0.7;
    }

    /* back */
    .back {
      background: var(--surface-back);
      border-color: var(--border-glow);
      transform: rotateY(180deg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.25rem 1rem;
      /* gold shimmer glow when revealed */
      box-shadow: inset 0 0 30px rgba(184,154,106,0.06);
    }

    .flip-wrap:hover .back {
      box-shadow:
        inset 0 0 30px rgba(184,154,106,0.10),
        0 0 22px 3px rgba(184,154,106,0.12);
    }

    .back-name {
      font-family: 'Cinzel', serif;
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.1em;
      color: var(--accent);
      text-align: center;
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(184,154,106,0.2);
      width: 100%;
      word-break: break-word;
    }

    .social-links {
      display: flex;
      flex-direction: column;
      gap: 6px;
      width: 100%;
    }

    .social-link {
      display: flex;
      align-items: center;
      gap: 9px;
      font-family: 'Crimson Pro', serif;
      font-size: 14px;
      font-weight: 300;
      color: #9a9590;
      text-decoration: none;
      padding: 4px 8px;
      border-radius: 5px;
      border: 1px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }

    .social-link:hover {
      color: var(--text);
      border-color: rgba(184,154,106,0.25);
    }

    .social-link svg { flex-shrink: 0; opacity: 0.7; }

    .no-socials {
      font-family: 'Crimson Pro', serif;
      font-style: italic;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }

    /* ── footer ── */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding-bottom: 3rem;
      font-family: 'Crimson Pro', serif;
      font-style: italic;
      font-size: 13px;
      color: var(--muted);
    }

    /* ── animations ── */
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<canvas id="rune-canvas" aria-hidden="true"></canvas>
<div class="bottom-glow" aria-hidden="true"></div>

<header>
  <p class="eyebrow">Survival Multiplayer</p>
  <h1>Wyrdcraft</h1>
  <p class="description">"Your fate is drawn. What you do with it is up to you."</p>
  <p class="tagline">meet the crew</p>
  <div class="divider"></div>
</header>

<main>
  <div class="grid" id="grid"></div>

<script>
/* ─────────────────────────────
   RUNE BACKGROUND — TRUE LOOP
   Each rune travels from bottom to top over a fixed duration,
   then resets instantly — guaranteeing a continuous, gapless loop.
───────────────────────────── */
(function () {
  const canvas = document.getElementById('rune-canvas');
  const ctx    = canvas.getContext('2d');

  const RUNES = ['ᚠ','ᚢ','ᚦ','ᚨ','ᚱ','ᚲ','ᚷ','ᚹ','ᚺ','ᚾ',
                 'ᛁ','ᛃ','ᛇ','ᛈ','ᛉ','ᛊ','ᛏ','ᛒ','ᛖ','ᛗ',
                 'ᛚ','ᛜ','ᛞ','ᛟ','ᚻ','ᚼ','ᛦ','ᛥ','ᛣ','ᛤ'];

  const GOLD   = [184, 154, 106];
  const PURPLE = [120,  80, 180];

  let W, H, particles;

  function rand(a, b) { return Math.random() * (b - a) + a; }

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function makeParticle(staggerY) {
    const cursed  = Math.random() < 0.42;
    const col     = cursed ? PURPLE : GOLD;
    const size    = rand(12, 26);
    const dur     = rand(12000, 28000);   // ms to travel full height
    const startMs = staggerY
      ? -(Math.random() * dur)            // stagger initial positions across full cycle
      : 0;
    return {
      x0:      rand(0, W),               // base x
      drift:   rand(-40, 40),            // total horizontal drift over full trip
      size,
      rune:    RUNES[Math.floor(Math.random() * RUNES.length)],
      r: col[0], g: col[1], b: col[2],
      peakA:   rand(0.05, cursed ? 0.16 : 0.21),
      dur,
      startMs,
      rot0:    rand(-0.5, 0.5),
      rotSpd:  rand(-0.0008, 0.0008),    // radians/ms
      flicker: cursed,
      ft:      rand(0, Math.PI * 2),
    };
  }

  function initParticles() {
    const count = Math.max(20, Math.floor(W * H / 20000));
    particles = Array.from({ length: count }, () => makeParticle(true));
  }

  let lastTs = null;

  function tick(ts) {
    if (!lastTs) lastTs = ts;
    const dt = ts - lastTs;
    lastTs = ts;

    ctx.clearRect(0, 0, W, H);

    for (let i = 0; i < particles.length; i++) {
      const p = particles[i];

      p.startMs += dt;
      p.ft      += dt * 0.0018;

      // progress 0→1 over full duration, then reset
      let prog = p.startMs / p.dur;
      if (prog >= 1) {
        // reset: new rune, new x, same loop structure
        const next  = makeParticle(false);
        next.startMs = 0;
        particles[i] = next;
        continue;
      }

      // position: bottom → top
      const y = H + p.size - (H + p.size * 3) * prog;
      const x = p.x0 + p.drift * prog;
      const rot = p.rot0 + p.rotSpd * p.startMs;

      // alpha: fade in first 15%, hold, fade out last 25%
      let alpha;
      if (p.flicker) {
        const heightFade = 1 - prog;
        alpha = p.peakA * heightFade * (0.5 + 0.5 * Math.sin(p.ft * 2.2 + Math.sin(p.ft * 3.5)));
      } else {
        const fadeIn  = Math.min(1, prog / 0.15);
        const fadeOut = prog > 0.75 ? Math.max(0, 1 - (prog - 0.75) / 0.25) : 1;
        alpha = p.peakA * fadeIn * fadeOut;
      }

      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(rot);
      ctx.globalAlpha = Math.min(1, Math.max(0, alpha));
      ctx.fillStyle   = `rgb(${p.r},${p.g},${p.b})`;
      ctx.font        = `${p.size}px serif`;
      ctx.textAlign   = 'center';
      ctx.textBaseline= 'middle';
      ctx.fillText(p.rune, 0, 0);
      ctx.restore();
    }

    requestAnimationFrame(tick);
  }

  resize();
  initParticles();
  requestAnimationFrame(tick);
  window.addEventListener('resize', () => { resize(); initParticles(); });
})();
